<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #4f46e5, #020617);
    color: #f9fafb;
}

.container {
    width: 100%;
    max-width: 380px;
    padding: 32px 24px;
    background: rgba(15, 23, 42, 0.9);
    border-radius: 24px;
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.6);
    text-align: center;
    backdrop-filter: blur(14px);
    border: 1px solid rgba(148, 163, 184, 0.35);
}

/* Avatar – możesz tu wrzucić tło ze zdjęciem */
.avatar {
    width: 96px;
    height: 96px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f97316, #ec4899, #6366f1);
    border: 3px solid #020617;
    box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.4);
}

/* Tytuł */
h1 {
    font-size: 1.6rem;
    margin-bottom: 20px;
    letter-spacing: 0.04em;
}

/* Linki */
.link {
    display: block;
    width: 100%;
    margin: 8px 0;
    padding: 12px 16px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 500;
    color: #e5e7eb;
    background: #111827;
    border: 1px solid #1f2937;
    transition: 
        transform 0.15s ease,
        box-shadow 0.15s ease,
        background 0.15s ease,
        border-color 0.15s ease;
}

.link:hover {
    background: #4f46e5;
    border-color: #818cf8;
    box-shadow: 0 10px 25px rgba(79, 70, 229, 0.55);
    transform: translateY(-2px);
}

.link:active {
    transform: translateY(0);
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.8);
}

/* Responsywność na mniejszych ekranach */
@media (max-width: 480px) {
    .container {
        margin: 0 16px;
        padding: 24px 18px;
    }

    h1 {
        font-size: 1.4rem;
    }
}

    </style>
</head>
<body>
    <div class="container">
        <div class="avatar"> </div>
        <h1>Mojelinki</h1>
        <a href="#" class="link">Instagram</a>
        <a href="#" class="link">YouTube</a>
        <a href="#" class="link">TikTok</a>
    </div>
</body>
</html>
